<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Management System</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 引入自定义CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- 顶部导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('admin_index') }}">基于LLM的RAG文档问答管理系统</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <span class="navbar-text">
            欢迎，{{ current_user.username if current_user.is_authenticated else 'Guest' }}
          </span>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('logout_page') }}">退出</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 页面主体布局 -->
<div class="container-fluid">
  <div class="row">
    <!-- 侧边栏 -->
    <div class="col-md-2 bg-light sidebar">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('admin_index') }}">后台主页</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('manage_users') }}">用户管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('manage_docs') }}">文档管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('manage_roles') }}">角色管理</a>
        </li>

      </ul>
    </div>

    <!-- 内容区域 -->
    <div class="col-md-10 main-content">
      {% block content %}
      <!-- 子页面的内容会插入到这里 -->
      {% endblock %}
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
