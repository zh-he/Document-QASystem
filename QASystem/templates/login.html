<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 页面背景 */
        body {
            background: url("{{ url_for('static', filename='images/login_bg.jpg') }}") no-repeat center center;
            background-size: cover;
            min-height: 100vh;
            margin: 0; /* 去掉默认margin */
        }

        /* 外层容器：Flex布局，让内部居中 */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 全屏高度 */
            padding: 20px; /* 给点内边距，避免卡片过于贴边 */
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);

            /* 控制卡片宽度：大屏幕下最大400px，小屏幕下全宽 */
            max-width: 400px;
            width: 100%;
        }

        .btn-primary {
            background-color: #343a40 !important;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #007bff !important;
        }

        /* 标题美化 */
        h2 {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 2rem !important;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-container">
        <h2 class="mb-4">用户登录</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100 mt-3">登录</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
